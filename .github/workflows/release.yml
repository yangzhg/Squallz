name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
          - os: ubuntu-24.04
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build platform package
        run: npm --prefix frontend run tauri -- build

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="run-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi

          arch="$(uname -m)"
          target_id="${{ matrix.platform }}-${arch}"
          out="target/release-artifacts"
          rm -rf "$out"
          mkdir -p "$out"

          copy_artifact() {
            local source="$1"
            local name="$2"
            local destination="$out/$name"
            if [[ -e "$destination" ]]; then
              echo "Artifact name collision: $name"
              exit 1
            fi
            cp "$source" "$destination"
          }

          case "${RUNNER_OS}" in
            Windows)
              cli_path="target/release/sqz.exe"
              cli_name="sqz-${version}-${target_id}.exe"
              gui_path="target/release/squallz-gui.exe"
              gui_name="Squallz-${version}-${target_id}.exe"
              ;;
            *)
              cli_path="target/release/sqz"
              cli_name="sqz-${version}-${target_id}"
              gui_path="target/release/squallz-gui"
              gui_name="Squallz-${version}-${target_id}"
              ;;
          esac

          if [[ -f "$cli_path" ]]; then
            copy_artifact "$cli_path" "$cli_name"
          fi

          if [[ "${RUNNER_OS}" != "macOS" && -f "$gui_path" ]]; then
            copy_artifact "$gui_path" "$gui_name"
          fi

          if [[ "${RUNNER_OS}" == "macOS" && -d target/release/bundle ]]; then
            while IFS= read -r -d '' app_bundle; do
              ditto -c -k --sequesterRsrc --keepParent \
                "$app_bundle" \
                "$out/Squallz-${version}-${target_id}.app.zip"
            done < <(find target/release/bundle -type d -name "Squallz.app" -print0)
          fi

          if [[ -d target/release/bundle ]]; then
            while IFS= read -r -d '' file; do
              case "$file" in
                *.app/*) continue ;;
              esac
              relative="${file#target/release/bundle/}"
              artifact_name="${relative//\//-}"
              copy_artifact "$file" "$artifact_name"
            done < <(find target/release/bundle -type f -print0)
          fi

          artifact_count="$(find "$out" -type f ! -name SHA256SUMS | wc -l | tr -d ' ')"
          if [[ "$artifact_count" == "0" ]]; then
            echo "No release artifacts were collected."
            exit 1
          fi

          (
            cd "$out"
            if command -v sha256sum >/dev/null 2>&1; then
              find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
                | sort -z \
                | xargs -0 sha256sum \
                | sed 's#  \./#  #' > SHA256SUMS
            else
              find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
                | sort -z \
                | xargs -0 shasum -a 256 \
                | sed 's#  \./#  #' > SHA256SUMS
            fi
          )

          echo "Collected release artifacts:"
          find "$out" -maxdepth 1 -type f -print | sort

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: target/release-artifacts/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: squallz-${{ matrix.platform }}-${{ github.run_id }}
          if-no-files-found: error
          path: target/release-artifacts/*

  publish:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          rm -rf release-assets
          mkdir -p release-assets

          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [[ -e "release-assets/$name" ]]; then
              echo "Release asset name collision: $name"
              exit 1
            fi
            cp "$file" "release-assets/$name"
          done < <(find downloaded-artifacts -type f ! -name SHA256SUMS -print0)

          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | sed 's#  \./#  #' > SHA256SUMS
          )

          echo "Release assets:"
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "Squallz ${GITHUB_REF_NAME}" \
              --notes "Unsigned preview artifacts. Verify checksums with SHA256SUMS and provenance with GitHub Artifact Attestations."
          fi

          gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
